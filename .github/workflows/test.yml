name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run plugin unit tests
        run: python3 -m unittest discover -s plugins/vision-product-loop/tests
      - name: Run plugin self-check
        run: python3 plugins/vision-product-loop/scripts/self_check.py --json
